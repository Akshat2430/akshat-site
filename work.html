<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Akshat Kharbanda (The Business Backpacker)</title>
  <meta name="description" content="Strategy, brand, AI, and GTM projects by Akshat Kharbanda — across 5 countries and 8 industries." />
  <link rel="canonical" href="https://akshatkharbanda.com/work.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Work — Akshat Kharbanda" />
  <meta property="og:description" content="Strategy, brand, AI, and GTM projects across 5 countries and 8 industries." />
  <meta property="og:url" content="https://akshatkharbanda.com/work.html" />
  <meta property="og:image" content="https://akshatkharbanda.com/public/images/og-image.jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://akshatkharbanda.com/public/images/og-image.jpeg" />
  <link rel="icon" type="image/jpeg" href="/public/images/akshat-avatar.jpg" />
  <link rel="apple-touch-icon" href="/public/images/akshat-avatar.jpg" />
  <link rel="stylesheet" href="styles.css" />
  <script src="data/cases.js"></script>
  <script src="nav.js" defer></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>

  <main class="page">
    <div class="container">

      <div style="margin-bottom: 2rem;" class="fade-up">
        <h1 class="page-title">Work</h1>
        <p class="page-sub">Projects across strategy, brand, AI, and GTM. Filtered by type of problem. More info and
          case studies available on request!</p>
      </div>

      <!-- BUCKET MARQUEES -->
      <div id="bucket-rows" class="fade-up fade-up-1"></div>

      <!-- CTA -->
      <div class="cta-block fade-up">
        <p class="cta-title">Let's work together</p>
        <p class="cta-sub">You've got the mandate. I'll build the system.</p>
        <a href="mailto:workwithakshatkharbanda@gmail.com" class="cta-email">workwithakshatkharbanda@gmail.com →</a>
      </div>

    </div>
  </main>

  <script>
    const bucketMeta = [
      { key: 'Entering', title: 'Entering new markets', blurb: 'Category creation, first-mover GTM, and strategy for spaces with no precedent.' },
      { key: 'Finding', title: 'Finding signal in noise', blurb: 'Cross-cultural research, consumer insight, and competitive intelligence.' },
      { key: 'Building', title: "Building what didn't exist", blurb: 'Frameworks, pilots, capabilities, and systems built from scratch.' }
    ];

    const cardHtml = (c) => `
      <a href="work/${c.slug}.html" class="case-card${c.featured ? ' case-card-highlight' : ''}">
        ${c.featured ? '<span class="case-card-star" aria-label="Highlight" title="Highlight project">★</span>' : ''}
        <span class="case-card-client">${c.client} · ${c.context}</span>
        <div class="case-card-q">${c.question}</div>
        <div class="case-card-sub">${c.subtitle}</div>
        <span class="case-card-arrow">→</span>
      </a>
    `;

    document.addEventListener('DOMContentLoaded', function () {
      const byBucket = {};
      bucketMeta.forEach(b => byBucket[b.key] = []);
      cases.forEach(c => { if (byBucket[c.category]) byBucket[c.category].push(c); });

      const container = document.getElementById('bucket-rows');
      container.innerHTML = bucketMeta.map(b => {
        const items = byBucket[b.key] || [];
        const ordered = [...items].sort((a, b) => (b.featured === true) - (a.featured === true));
        return `
          <section class="case-bucket">
            <div class="case-bucket-head">
              <h2 class="case-bucket-title">${b.title}</h2>
            </div>
            <p class="case-bucket-blurb">${b.blurb}</p>
            <div class="case-grid">
              ${ordered.map(cardHtml).join('')}
            </div>
          </section>
        `;
      }).join('');
    });
  </script>

</body>

</html>
